services:
  - type: web
    name: st-thomas-church
    env: python
    plan: free
    runtime: python-3.11
    buildCommand: >
      pip install -r backend/requirements.txt &&
      cd frontend &&
      npm install &&
      npm run build
    startCommand: >
      cd backend &&
      gunicorn server.wsgi:application
      --bind 0.0.0.0:$PORT
      --workers 2
      --timeout 60
